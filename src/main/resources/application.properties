spring.application.name=relatorios-offline
spring.datasource.url=jdbc:postgresql://localhost:5432/relatoriosOffline
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver
server.port=8084
server.max-http-request-header-size=65536

security.token.secret.admin= chavesecretaaseralterada

spring.web.resources.static-locations=classpath:/static/
app.upload.base-dir=C:/relatorioOffline/uploads
app.reports.base-dir=C:/relatorioOffline/jasper
app.reports.cache-enabled=true
app.reports.reload-on-change=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
