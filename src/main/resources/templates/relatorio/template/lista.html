<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, ~{::custom-styles}, ~{::custom-scripts})}">
<head>
    <meta charset="UTF-8">
    <title>Templates de relatorio</title>
</head>
<body>
<th:block th:fragment="custom-styles"></th:block>
<th:block th:fragment="content">
<section>
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h2 class="mb-1">Templates de relatorio</h2>
            <p class="text-muted mb-0">Disponiveis para os municipios da regional.</p>
        </div>
        <a class="btn btn-primary" href="/regional/relatorios/templates/novo">
            <i class="bi bi-plus-lg"></i> Novo template
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>Nome</th>
                <th>Descricao</th>
                <th>Status</th>
                <th>Campos</th>
                <th class="text-end">Acoes</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${templates == null || #lists.isEmpty(templates)}">
                <td colspan="5" class="text-center text-muted">Nenhum template cadastrado.</td>
            </tr>
            <tr th:each="template : ${templates}">
                <td th:text="${template.nome}">Nome</td>
                <td th:text="${template.descricao} ?: '-'">Descricao</td>
                <td>
                    <span class="badge" th:classappend="${template.ativo} ? 'bg-success' : 'bg-secondary'"
                          th:text="${template.ativo} ? 'Ativo' : 'Inativo'">Ativo</span>
                </td>
                <td th:text="${template.campos != null ? template.campos.size() : 0}">0</td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{|/regional/relatorios/templates/${template.id}/editar|}">
                        <i class="bi bi-pencil"></i> Editar
                    </a>
                    <form th:action="@{|/regional/relatorios/templates/${template.id}/excluir|}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                onclick="return confirm('Deseja remover este template?');">
                            <i class="bi bi-trash"></i> Excluir
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    </section>
</th:block>

<th:block th:fragment="custom-scripts"></th:block>
</body>
</html>
