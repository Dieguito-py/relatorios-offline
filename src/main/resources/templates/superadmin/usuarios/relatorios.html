<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, ~{::custom-styles}, ~{::custom-scripts})}">
<head>
    <meta charset="UTF-8">
    <title>Relatórios do Usuário</title>
</head>
<body>
<th:block th:fragment="custom-styles"></th:block>

<th:block th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1" th:text="'Relatórios de ' + ${usuario.nome}">Relatórios</h1>
            <p class="text-muted mb-0" th:text="${usuario.username}">username</p>
        </div>
        <div class="btn-group">
            <a href="/superadmin/usuarios" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Usuários
            </a>
            <a href="/" class="btn btn-outline-secondary">
                <i class="bi bi-house"></i> Home
            </a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>Data</th>
                <th>Nome atingido</th>
                <th>Cidade</th>
                <th>Dano residência</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(relatorios)}">
                <td colspan="5" class="text-center text-muted py-4">Nenhum relatório associado a este usuário.</td>
            </tr>
            <tr th:each="relatorio : ${relatorios}">
                <td th:text="${#temporals.format(relatorio.dataDesastre, 'dd/MM/yyyy HH:mm')}">01/01/2024</td>
                <td th:text="${relatorio.nomeAtingido}">Nome</td>
                <td th:text="${relatorio.cidadeAtingido}">Cidade</td>
                <td th:text="${relatorio.danoResidencia}">Dano</td>
                <td>
                    <a th:href="@{|/relatorios/${relatorio.id}|}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-eye"></i> Detalhes
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</th:block>

<th:block th:fragment="custom-scripts"></th:block>
</body>
</html>
