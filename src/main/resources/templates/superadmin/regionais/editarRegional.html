<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, ~{::custom-styles}, ~{::custom-scripts})}">
<head>
    <meta charset="UTF-8">
    <title>Editar Regional</title>
</head>
<body>
<th:block th:fragment="custom-styles"></th:block>

<th:block th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Editar regional</h1>
            <p class="text-muted mb-0" th:text="${regional.nome}">Regional</p>
        </div>
        <a href="/master/regionais" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Voltar
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}">Erro</div>
            <form th:action="@{|/master/regionais/${regional.id}/editar|}" method="post">
                <div class="mb-3">
                    <label class="form-label" for="nome">Nome da regional</label>
                    <input id="nome" name="nome" class="form-control" required maxlength="100" th:value="${regional.nome}">
                </div>

                <button type="submit" class="btn btn-primary">Salvar alterações</button>
            </form>
        </div>
    </div>
</th:block>

<th:block th:fragment="custom-scripts"></th:block>
</body>
</html>
