<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Relatórios Offline</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" type="image/png" th:href="@{/assets/logodc.png}">

    <style>
        body {
            background: #edeafb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 15px;
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .login-header {
            background: #E67817;
            color: #fff;
            padding: 2rem;
            text-align: center;
        }
        .login-header img {
            height: 110px;
            margin-bottom: .5rem;
        }
        .login-body { padding: 2rem; }
        .form-floating { margin-bottom: 1rem; }
        .form-floating > label { padding-left: 2.5rem; }
        .form-control {
            padding-left: 2.5rem;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            transition: all .3s;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 .2rem rgba(13,110,253,.15);
        }
        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
            z-index: 4;
            font-size: 1.2rem;
        }
        .input-wrapper { position: relative; }
        .btn-login {
            width: 100%;
            padding: .75rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            background: #E67817;
            border: none;
            margin-top: 1rem;
            transition: all .3s;
        }
        .btn-login:hover {
            background: #E67817;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px #E67817;
        }
        .btn-login:focus,
        .btn-login:active,
        .btn-login:focus-visible {
            background: #C95A12 !important;
            box-shadow: 0 5px 15px rgba(201,90,18,0.35) !important;
            outline: none !important;
            transform: translateY(-1px) !important;
            color: #fff !important;
        }
        .alert { border-radius: 10px; margin-bottom: 1rem; }
        .footer-text {
            text-align: center;
            margin-top: 2rem;
            color: #4c4c4c;
            font-size: .9rem;
        }
        .footer-text a { color: #4c4c4c; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img th:src="@{/assets/logodc.png}" alt="Relatórios Offline logo">
                <h1>Relatórios Offline</h1>
                <p>Sistema de Coleta e Processamento de Dados</p>
            </div>
            <div class="login-body">
                <div th:if="${error}" class="alert alert-danger" role="alert">
                    <i class="bi bi-exclamation-triangle"></i>
                    <span th:text="${error}">Erro ao fazer login</span>
                </div>
                <div th:if="${message}" class="alert alert-success" role="alert">
                    <i class="bi bi-check-circle"></i>
                    <span th:text="${message}">Mensagem</span>
                </div>
                <form th:action="@{/login}" method="post">
                    <div class="input-wrapper">
                        <div class="form-floating">
                            <i class="bi bi-person input-icon"></i>
                            <input type="text" class="form-control" id="username" name="username" placeholder="Usuário" required autofocus>
                            <label for="username">Nome de usuário</label>
                        </div>
                    </div>
                    <div class="input-wrapper">
                        <div class="form-floating">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Senha" required>
                            <label for="password">Senha</label>
                        </div>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="remember-me" name="remember-me">
                        <label class="form-check-label" for="remember-me">Lembrar-me</label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-login">
                        <i class="bi bi-box-arrow-in-right"></i> Entrar
                    </button>
                </form>
            </div>
        </div>
        <div class="footer-text">
            <p>&copy; 2025 IFSC XXE - Todos os direitos reservados</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
